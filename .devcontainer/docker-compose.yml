# Project name for organizing gentecBench containers in Docker Desktop
name: gentec-bench

services:
  gentec_bench:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USERNAME: ${USER}
        USER_UID: ${UID:-1000}
        USER_GID: ${GID:-1000}
        DEBUG: false
    
    container_name: gentec_bench
    
    # Mount your workspace
    volumes:
      # Mount full host home directory
      - ~:/home/${USER}:cached
      # Mount projects folder for VS Code explorer
      - ~/projects:/projects:cached
      - ../:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock
      - ${WIN_SCREENSHOTS:-/dev/null}:/workspace/screenshots:ro  # Windows Screenshots
    
    # Forward common ports
    ports:
      - "3000-3100:3000-3100"  # Web servers
      - "8888:8888"  # Jupyter
      - "8050:8050"  # Dash/Plotly
      - "5050:5000"  # Flask
    
    # Keep container running
    command: sleep infinity
    
    # Set working directory
    working_dir: /workspace
    
    # Set user
    user: "${UID:-1000}:${GID:-1000}"
    
    # Environment variables
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-gentecbench}
    
    # Connect to shared gentecBench network
    networks:
      - gentec_bench

# Shared network for gentecBench containers
networks:
  gentec_bench:
    name: gentec_bench
    driver: bridge
